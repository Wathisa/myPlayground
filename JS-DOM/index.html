<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <title>โปรแกรมตรวจสัญญาณไฟ</title>
    <style>
      body {
        font-family: sans-serif;
        text-align: center;
        margin-top: 50px;
      }
      input {
        padding: 10px;
        border-radius: 10px;
        border: 1px solid #000;
        width: 200px;
      }
      button {
        padding: 10px 20px;
        border-radius: 10px;
        cursor: pointer;
        margin-top: 20px;
        display: block;
        margin-left: auto;
        margin-right: auto;
      }
      #displayArea {
        margin-top: 30px;
        font-size: 24px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h2>สัญญาณไฟ</h2>
    <input
      type="text"
      id="lightInput"
      placeholder="พิมพ์สีไฟที่นี่ (แดง, เหลือง, เขียว)"
    />

    <button id="checkBtn">เช็คสถานะ</button>

    <div id="displayArea">
      <p id="lightName"></p>
      <p id="lightAction"></p>
    </div>

    <script src="script.js"></script>
  </body>
</html>
