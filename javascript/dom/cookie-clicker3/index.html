<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cookie Clicker</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-100 px-6 py-8 text-slate-900">
    <main class="mx-auto grid max-w-4xl gap-6 md:grid-cols-[2fr_1fr]">
      <section
        class="rounded-xl border border-slate-300 bg-white p-6 shadow-sm"
      >
        <h1 class="mb-6 text-3xl font-bold">Cookie Clicker</h1>
        <div class="space-y-2">
          <p id="cookie-count" class="text-lg">Cookies: 0</p>
          <p id="click-power" class="text-lg">Click power: 1</p>
          <p id="auto-power" class="text-lg">Auto cookies: 0 / sec</p>
        </div>
        <button
          id="cookie-button"
          type="button"
          class="mt-8 flex h-44 w-44 items-center justify-center rounded-full border border-slate-300 bg-amber-200 text-2xl font-semibold transition hover:bg-amber-300"
        >
          Cookie
        </button>
      </section>

      <section
        class="rounded-xl border border-slate-300 bg-white p-6 shadow-sm"
      >
        <h2 class="mb-4 text-2xl font-semibold">Upgrades</h2>
        <div class="space-y-3">
          <button
            id="buy-click"
            type="button"
            class="w-full rounded-lg border border-slate-300 px-4 py-3 text-left transition enabled:hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-50"
          ></button>
          <button
            id="buy-auto"
            type="button"
            class="w-full rounded-lg border border-slate-300 px-4 py-3 text-left transition enabled:hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-50"
          ></button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
