<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>คำนวณ BMI</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-sky-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-6 rounded-2xl shadow-lg w-full max-w-md">
      <h1 class="text-2xl font-bold text-center text-sky-600 mb-6">
        คำนวณ BMI
      </h1>

      <div class="mb-4">
        <label class="block mb-2 font-medium">น้ำหนัก (กิโลกรัม)</label>
        <input
          type="number"
          id="weight"
          placeholder="เช่น 50"
          class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400"
        />
      </div>

      <div class="mb-4">
        <label class="block mb-2 font-medium">ส่วนสูง (เซนติเมตร)</label>
        <input
          type="number"
          id="height"
          placeholder="เช่น 160"
          class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400"
        />
      </div>

      <button
        id="bmiBtn"
        onclick="calculateBMI()"
        class="w-full bg-sky-500 text-white py-2 rounded-lg hover:bg-sky-600 transition"
      >
        คำนวณ BMI
      </button>

      <div
        id="result"
        class="mt-6 text-center text-lg font-semibold text-gray-700"
      ></div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
