<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magical Girls Alliance</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="dashboard">
      <div class="column left-col">
        <div class="progress-section">
          <p>✨ พลังเวทแห่งจักรวาล ✨</p>
          <h1 id="scoreDisplay">0</h1>
          <p>อัตราการผลิต: <span id="rateDisplay">0</span> / วินาที</p>

          <p class="mobile-only" style="color: #e91e63; font-weight: bold">
            พลังร่ายมนต์: <span id="mobileClickPowerDisplay">1</span> หน่วย /
            คลิก
          </p>
        </div>

        <div class="target-container">
          <button id="clickButton" class="target-btn">
            <img src="sailormoon.png" alt="Sailor Moon" />
          </button>
        </div>
      </div>

      <div class="column middle-col">
        <h2>Magical Girls Alliance</h2>
        <h3>สมาพันธ์สาวน้อยเวทมนตร์</h3>
        <div class="status-box">
          <p>พลังเวทต่อการร่ายมนต์ 1 ครั้ง</p>
          <h3 id="clickPowerDisplay">1 หน่วย / คลิก</h3>
        </div>
      </div>

      <div class="column right-col">
        <h2>อัปเกรดพลัง</h2>

        <button id="buyUpgrade1" class="upgrade-btn">
          <div class="upgrade-info">
            <strong>สารเคมี X (Chemical X)</strong>
            <p>+1 พลังร่ายมนต์ (ต่อคลิก)</p>
          </div>
          <div class="upgrade-cost"><span id="cost1">20</span> พลังเวท</div>
        </button>

        <button id="buyUpgrade2" class="upgrade-btn">
          <div class="upgrade-info">
            <strong>คทาแห่งดวงดาว (Star Wand)</strong>
            <p>+1 ออโต้ / วินาที</p>
          </div>
          <div class="upgrade-cost"><span id="cost2">65</span> พลังเวท</div>
        </button>

        <button id="buyUpgrade3" class="upgrade-btn">
          <div class="upgrade-info">
            <strong>แมวเหมียวลูน่า (Luna's Guidance)</strong>
            <p>+5 ออโต้ / วินาที</p>
          </div>
          <div class="upgrade-cost"><span id="cost3">200</span> พลังเวท</div>
        </button>

        <button id="buyUpgrade4" class="upgrade-btn">
          <div class="upgrade-info">
            <strong>โคลว์การ์ด (Clow Cards)</strong>
            <p>+20 ออโต้ / วินาที</p>
          </div>
          <div class="upgrade-cost"><span id="cost4">800</span> พลังเวท</div>
        </button>

        <button id="buyUpgrade5" class="upgrade-btn">
          <div class="upgrade-info">
            <strong>พลังมิตรภาพทะลุมิติ! (Bestfriend's Power)</strong>
            <p>+100 ออโต้ / วินาที</p>
          </div>
          <div class="upgrade-cost"><span id="cost5">2500</span> พลังเวท</div>
        </button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
