<!doctype html>
<!-- กำหนดว่าเอกสารนี้เป็นไฟล์ HTML5 -->
<html lang="th">
  <!-- ระบุว่าภาษาหลักของหน้าเว็บคือภาษาไทย -->
  <head>
    <!-- ส่วน head ใช้เก็บข้อมูลตั้งค่าของหน้าเว็บ -->
    <meta charset="UTF-8" />
    <!-- รองรับอักขระภาษาไทยและอักขระพิเศษต่าง ๆ -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ทำให้หน้าเว็บแสดงผลได้เหมาะกับหน้าจอมือถือ -->
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <!-- โหลดฟอนต์ Fredoka จาก Google Fonts -->
    <title>Magical Girls Alliance</title>
    <!-- ชื่อที่แสดงบนแท็บเบราว์เซอร์ -->
    <link rel="stylesheet" href="style.css" />
    <!-- เชื่อมไฟล์ CSS ภายนอกเข้ากับหน้าเว็บ -->
  </head>
  <body>
    <!-- ส่วน body คือเนื้อหาที่ผู้ใช้มองเห็นบนหน้าเว็บ -->
    <div class="dashboard">
      <!-- กล่องหลักของหน้าเว็บ ใช้ครอบทุกคอลัมน์ -->
      <div class="column main-col">
        <!-- คอลัมน์หลักฝั่งซ้ายที่รวมคอลัมน์ซ้ายและกลางเดิมเข้าด้วยกัน -->
        <h2>The Powerpuff Girls HQ</h2>
        <!-- หัวข้อหลักของคอลัมน์ซ้าย -->
        <div class="main-top">
          <!-- กล่องด้านบน ใช้รวมส่วนคะแนนและสถานะพลังต่อคลิก -->
          <div class="progress-section">
            <!-- ส่วนแสดงคะแนนและพลังอัตโนมัติ -->
            <h2>Chemical X Energy</h2>
            <!-- หัวข้อของคะแนนหลักในเกม -->
            <h1 id="scoreDisplay">0</h1>
            <!-- ตัวเลขคะแนนปัจจุบัน โดย JavaScript จะอัปเดตค่าตรงนี้ -->
            <p>Auto Power: <span id="rateDisplay">0</span> / sec</p>
            <!-- แสดงค่าพลังอัตโนมัติต่อวินาที -->
          </div>

          <div class="status-box">
            <!-- กล่องแสดงสถานะพลังต่อการคลิกหนึ่งครั้ง -->
            <p>Power per Click</p>
            <!-- ข้อความบอกประเภทของสถานะที่กำลังแสดง -->
            <h3 id="clickPowerDisplay">1 Power / Click</h3>
            <!-- JavaScript จะอัปเดตค่าพลังต่อคลิกที่บรรทัดนี้ -->
          </div>
        </div>

        <div class="target-container">
          <!-- กล่องครอบปุ่มหลักสำหรับให้ผู้เล่นกดเก็บคะแนน -->
          <button id="clickButton" class="target-btn">
            <!-- ปุ่มหลักของเกมที่ใช้คลิกเพื่อเพิ่มคะแนน -->
            <img src="power-btn.png" alt="Powerpuff Girls" />
            <!-- รูปภาพที่อยู่ภายในปุ่มคลิก -->
          </button>
        </div>
      </div>

      <div class="column right-col">
        <!-- คอลัมน์ขวาสำหรับแสดงรายการอัปเกรด -->
        <h2>Team Upgrades</h2>
        <!-- หัวข้อของส่วนอัปเกรดทั้งหมด -->

        <button id="buyUpgrade1" class="upgrade-btn">
          <!-- ปุ่มซื้ออัปเกรดชิ้นที่ 1 -->
          <div class="upgrade-info">
            <!-- ส่วนข้อมูลชื่อและรายละเอียดของอัปเกรด -->
            <strong>Chemical X Boost</strong>
            <!-- ชื่ออัปเกรด -->
            <p>+1 power per click</p>
            <!-- รายละเอียดผลลัพธ์ของอัปเกรด -->
          </div>
          <div class="upgrade-cost"><span id="cost1">20</span> energy</div>
          <!-- ราคาของอัปเกรด โดย JavaScript จะอัปเดตเลขใน span นี้ -->
        </button>

        <button id="buyUpgrade2" class="upgrade-btn">
          <!-- ปุ่มซื้ออัปเกรดชิ้นที่ 2 -->
          <div class="upgrade-info">
            <!-- ส่วนข้อมูลชื่อและรายละเอียดของอัปเกรด -->
            <strong>Blossom’s Leadership</strong>
            <!-- ชื่ออัปเกรด -->
            <p>+1 power per second</p>
            <!-- รายละเอียดผลลัพธ์ของอัปเกรด -->
          </div>
          <div class="upgrade-cost"><span id="cost2">65</span> energy</div>
          <!-- ราคาของอัปเกรด โดย JavaScript จะอัปเดตเลขใน span นี้ -->
        </button>

        <button id="buyUpgrade3" class="upgrade-btn">
          <!-- ปุ่มซื้ออัปเกรดชิ้นที่ 3 -->
          <div class="upgrade-info">
            <!-- ส่วนข้อมูลชื่อและรายละเอียดของอัปเกรด -->
            <strong>Bubbles’ Joy</strong>
            <!-- ชื่ออัปเกรด -->
            <p>+5 power per second</p>
            <!-- รายละเอียดผลลัพธ์ของอัปเกรด -->
          </div>
          <div class="upgrade-cost"><span id="cost3">200</span> energy</div>
          <!-- ราคาของอัปเกรด โดย JavaScript จะอัปเดตเลขใน span นี้ -->
        </button>

        <button id="buyUpgrade4" class="upgrade-btn">
          <!-- ปุ่มซื้ออัปเกรดชิ้นที่ 4 -->
          <div class="upgrade-info">
            <!-- ส่วนข้อมูลชื่อและรายละเอียดของอัปเกรด -->
            <strong>Buttercup’s Strength</strong>
            <!-- ชื่ออัปเกรด -->
            <p>+20 power per second</p>
            <!-- รายละเอียดผลลัพธ์ของอัปเกรด -->
          </div>
          <div class="upgrade-cost"><span id="cost4">800</span> energy</div>
          <!-- ราคาของอัปเกรด โดย JavaScript จะอัปเดตเลขใน span นี้ -->
        </button>

        <button id="buyUpgrade5" class="upgrade-btn">
          <!-- ปุ่มซื้ออัปเกรดชิ้นที่ 5 -->
          <div class="upgrade-info">
            <!-- ส่วนข้อมูลชื่อและรายละเอียดของอัปเกรด -->
            <strong>Professor Utonium’s Lab</strong>
            <!-- ชื่ออัปเกรด -->
            <p>+100 power per second</p>
            <!-- รายละเอียดผลลัพธ์ของอัปเกรด -->
          </div>
          <div class="upgrade-cost"><span id="cost5">2500</span> energy</div>
          <!-- ราคาของอัปเกรด โดย JavaScript จะอัปเดตเลขใน span นี้ -->
        </button>
      </div>
    </div>

    <script src="script.js"></script>
    <!-- เชื่อมไฟล์ JavaScript เพื่อให้เกมทำงานได้ -->
  </body>
</html>
